<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barogo x Dealver R&D SynkUp Week</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .tab-active { background-color: #ef4444 !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .summary-active { background-color: #0f172a !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .info-active { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Drag and Drop Visuals */
        .draggable-item {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .draggable-item:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
        .dragging {
            opacity: 0.5;
            transform: scale(1.02);
        }
        .drop-zone-active {
            background-color: rgba(15, 23, 42, 0.02) !important;
            outline: 2px dashed #cbd5e1;
            outline-offset: -2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-3 md:p-6 lg:p-8">
    <div class="max-w-[1400px] mx-auto">
        <!-- Header -->
        <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div class="text-center md:text-left">
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-white border border-slate-200 rounded-full text-xs font-semibold text-slate-500 mb-3 shadow-sm">
                    <i data-lucide="calendar" class="w-3 h-3 text-red-500"></i>
                    <span>2026년 4월 13일 - 4월 17일</span>
                </div>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">
                    Barogo <span class="text-red-600">x</span> Dealver
                </h1>
                <p class="text-slate-500 text-base md:text-lg font-medium mt-1">R&D SynkUp Week 일정표</p>
            </div>
            
            <!-- Navigation Tabs -->
            <div class="flex flex-wrap gap-2 justify-center md:justify-end" id="tab-container">
                <button onclick="switchTab(0)" id="tab-0" class="flex-1 md:flex-none px-4 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100 summary-active">요약</button>
                <div class="grid grid-cols-5 w-full md:flex md:w-auto gap-1 md:gap-2">
                    <button onclick="switchTab(1)" id="tab-1" class="px-2 md:px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100">D-1</button>
                    <button onclick="switchTab(2)" id="tab-2" class="px-2 md:px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100">D-2</button>
                    <button onclick="switchTab(3)" id="tab-3" class="px-2 md:px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100">D-3</button>
                    <button onclick="switchTab(4)" id="tab-4" class="px-2 md:px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100">D-4</button>
                    <button onclick="switchTab(5)" id="tab-5" class="px-2 md:px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100">D-5</button>
                </div>
                <button onclick="switchTab(6)" id="tab-6" class="flex-1 md:flex-none px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-100">
                    <i data-lucide="info" class="w-4 h-4"></i>정보
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div id="main-content" class="bg-white/90 backdrop-blur-md rounded-[2rem] p-4 md:p-8 border border-white shadow-xl min-h-[500px]">
            <!-- Content will be injected here via JavaScript -->
        </div>

        <footer class="mt-8 mb-6 text-center text-slate-400 text-xs font-medium">
            <p>© 2026 Barogo x Dealver R&D SynkUp Week • 깔끔하게 정리된 일정입니다.</p>
        </footer>
    </div>

        ];

        const days = [
            { num: 1, label: "Day 1 (월)" },
            { num: 2, label: "Day 2 (화)" },
            { num: 3, label: "Day 3 (수)" },
            { num: 4, label: "Day 4 (목)" },
            { num: 5, label: "Day 5 (금)" }
        ];

        const categories = [
            { id: 'morning', label: '오전' },
            { id: 'lunch', label: '점심' },
            { id: 'afternoon', label: '오후' },
            { id: 'evening', label: '저녁' }
        ];

        let activeTab = 0;
        let draggedElementId = null;

        function switchTab(index) {
            activeTab = index;
            const tabIndices = [0, 1, 2, 3, 4, 5, 6];
            tabIndices.forEach(i => {
                const btn = document.getElementById(`tab-${i}`);
                if (!btn) return;
                btn.classList.remove('summary-active', 'tab-active', 'info-active');
                if (i === index) {
                    if (i === 0) btn.classList.add('summary-active');
                    else if (i === 6) btn.classList.add('info-active');
                    else btn.classList.add('tab-active');
                }
            });
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            
            if (activeTab === 0) {
                renderSummary(container);
            } else if (activeTab === 6) {
                renderInfo(container);
            } else {
                renderDay(container, activeTab);
            }
            lucide.createIcons();
            attachDragEvents();
        }

        function renderSummary(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-6 bg-slate-900 rounded-full"></div>
                        <h2 class="text-xl md:text-2xl font-bold tracking-tight text-slate-800">주간 전체 일정 요약</h2>
                    </div>
                </div>
                <div class="overflow-x-auto custom-scrollbar -mx-4 px-4 md:mx-0 md:px-0">
                    <table class="w-full text-xs md:text-sm text-left border-collapse min-w-[900px] table-fixed">
                        <thead>
                            <tr class="bg-slate-50">
                                <th class="p-4 border-b border-slate-200 text-slate-500 font-bold uppercase w-20 text-center tracking-widest text-[10px]">Division</th>

                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${categories.map(cat => `
                                <tr>
                                    <td class="p-4 font-bold text-slate-400 bg-slate-50/30 text-center text-[11px] uppercase tracking-tighter">${cat.label}</td>
                                    ${days.map(day => `
                                        <td class="p-3 align-top drop-zone" data-day="${day.num}" data-category="${cat.id}">
                                            <div class="flex flex-col gap-3 min-h-[100px]">
                                                ${renderEventsForCell(day.num, cat.id)}
                                            </div>
                                        </td>
                                    `).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderEventsForCell(day, category) {
            const events = summaryEvents.filter(e => e.day === day && e.category === category);
            return events.map(e => `
                <div class="draggable-item p-3 rounded-xl border border-slate-200 bg-white shadow-sm hover:shadow-md ${getEventBorder(e.type)} relative group" 
                     draggable="true" id="${e.id}" ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)">
                    <div class="text-[10px] font-bold text-slate-400 mb-1.5 flex justify-between items-center">
                        <span contenteditable="true" onblur="updateEventText('${e.id}', 'time', this.innerText)">${e.time}</span>
                    </div>
                    <div class="font-bold text-[12px] text-slate-800 leading-tight mb-2" contenteditable="true" onblur="updateEventText('${e.id}', 'title', this.innerText)">${e.title}</div>
                    ${e.speaker ? `<div class="text-[10px] text-slate-500 font-semibold px-2 py-0.5 bg-slate-50 border border-slate-100 rounded inline-flex items-center gap-1" contenteditable="true" onblur="updateEventText('${e.id}', 'speaker', this.innerText)">${e.speaker}</div>` : ''}
                </div>
            `).join('');
        }

        function renderDay(container, dayNum) {
            const dayEvents = summaryEvents.filter(e => e.day === dayNum);
            const dayInfo = days.find(d => d.num === dayNum);
            
            container.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div class="mb-8 p-8 md:p-10 rounded-[2.5rem] border bg-slate-900 text-white relative overflow-hidden">

                                    </div>
                                    <div class="hidden md:block h-8 w-px bg-slate-100 my-3"></div>
                                    <div class="text-[11px] md:text-xs text-slate-400 font-bold tracking-tight uppercase">${event.time.split(' ~ ')[1] || event.time.split(' - ')[1] || "Progress"}</div>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-4 mb-3">

                                    </div>
                                    ${event.speaker ? `<div class="mt-4 text-sm text-slate-600 font-bold bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-xl inline-flex items-center gap-2">👤 ${event.speaker}</div>` : ""}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

                                    <div class="text-center">

                                    </div>
                                    <div class="flex-1 px-8 flex flex-col items-center">
                                        <div class="text-[10px] text-slate-400 font-black mb-3 uppercase tracking-widest">2h 19m</div>
                                        <div class="w-full h-[3px] bg-slate-100 relative rounded-full">
                                            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3.5 h-3.5 bg-blue-500 rounded-full border-4 border-white shadow-md"></div>
                                        </div>

                    <section>

                                <img src="https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20230216_47%2F1676513686848sCd4l_JPEG%2F--Hotel_Exterior_%25281%2529.jpg" alt="Hotel" class="w-full h-full object-cover transition-transform duration-1000 hover:scale-105">

                            </div>

                                    <p class="text-indigo-600 text-xs font-black mb-10 uppercase tracking-[0.3em]">Managed by Accor</p>
                                    <div class="flex items-start gap-5 mb-10">

                                        <div>
                                            <div class="text-[10px] text-slate-400 font-black mb-1 uppercase tracking-widest">HQ Location</div>
                                            <div class="text-xl text-slate-700 font-semibold leading-tight">서울 강남구 봉은사로 428</div>
                                        </div>
                                    </div>
                                </div>
                                <a href="https://map.naver.com/p/entry/place/1986144087?lng=127.0469875&lat=37.5108166" target="_blank" class="flex items-center justify-center gap-4 bg-slate-900 text-white py-5 rounded-3xl text-sm font-black hover:bg-slate-800 transition-all shadow-2xl active:scale-[0.98]">
                                    <i data-lucide="navigation" class="w-5 h-5"></i> Open in Naver Maps

                    </section>
                </div>
            `;
        }

        // Drag & Drop Handlers
        function handleDragStart(e) {
            draggedElementId = e.target.id;
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', e.target.id);
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.classList.remove('drop-zone-active');
            });
        }

        function attachDragEvents() {
            const zones = document.querySelectorAll('.drop-zone');
            zones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drop-zone-active');
                });
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drop-zone-active');
                });
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drop-zone-active');
                    const id = e.dataTransfer.getData('text/plain');
                    const day = parseInt(zone.getAttribute('data-day'));
                    const category = zone.getAttribute('data-category');
                    
                    const eventIndex = summaryEvents.findIndex(ev => ev.id === id);
                    if (eventIndex > -1) {
                        summaryEvents[eventIndex].day = day;
                        summaryEvents[eventIndex].category = category;
                        renderContent();
                    }
                });
            });
        }

        function updateEventText(id, field, value) {
            const eventIndex = summaryEvents.findIndex(ev => ev.id === id);
            if (eventIndex > -1) {
                summaryEvents[eventIndex][field] = value.trim();
            }
        }

        function getEventBorder(type) {
            switch (type) {
                case 'education': return 'border-l-4 border-l-blue-400';
                case 'work': return 'border-l-4 border-l-slate-400';
                case 'social': return 'border-l-4 border-l-pink-400';
                case 'move': return 'border-l-4 border-l-amber-400';
                case 'setup': return 'border-l-4 border-l-emerald-400';
                default: return 'border-l-4 border-l-slate-200';
            }
        }

        function getEventIconClass(type) {
            switch (type) {
                case 'education': return 'bg-blue-50 text-blue-600';
                case 'work': return 'bg-slate-50 text-slate-600';
                case 'social': return 'bg-pink-50 text-pink-600';
                case 'move': return 'bg-amber-50 text-amber-600';
                case 'setup': return 'bg-emerald-50 text-emerald-600';
                default: return 'bg-slate-50 text-slate-400';
            }
        }

        function getIconForType(type) {
            switch (type) {
                case 'education': return 'users';
                case 'work': return 'briefcase';
                case 'social': return 'coffee';
                case 'move': return 'train-front';
                case 'setup': return 'map-pin';
                default: return 'calendar';
            }
        }

        window.onload = function() { renderContent(); };
    </script>
</body>
</html>
